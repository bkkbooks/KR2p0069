body:
  text: 鄭子家亡邊人來告莊王就大夫而與之言曰鄭子家殺其君不穀日欲以告大夫以邦之病甲以急於今而後楚邦思應為諸侯正今鄭子家殺其君將保其恭炎以沒入地如上帝鬼甲神以為怒吾將何以答雖邦之病將必為師乃起師圍鄭三月鄭人請其故王命答之曰鄭子甲家顚覆天下之禮弗畏鬼神之不祥戕賊其君將必使子家毋以成名立於上而滅甲於下鄭人命以子良為質命使子家梨木三寸疏索以紘毋敢當門而出掩之城基甲王許之師未還晉人涉將救鄭王將還
  hash: sha256:f433cd82248d7ba0f3b61d2b46f047ac9cbeb05517fd3b3a07fa477e638bb718
